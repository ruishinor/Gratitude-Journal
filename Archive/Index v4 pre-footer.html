<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reasons for Gratitude</title>
    <style>
        /* Typography: Lora is warmer and more 'comfortable' than Baskerville */
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap');

        :root {
            --bg-color: #fdfcf8;
            --text-color: #1a1a1a; /* Deeper black for readability */
            --accent-color: #8e9794;
            --overlay-bg: rgba(253, 252, 248, 0.99);
            
            /* --- STATISTICS TOGGLE --- */
            /* Change 'flex' to 'none' to hide specific stats, none to flex to show them */
            --show-visitors: none; 
            --show-notes: none;
        }

        body {
            margin: 0;
            font-family: 'Lora', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* Main Content */
        .container {
            max-width: 750px;
            width: 100%;
            transition: filter 0.5s ease;
        }

        h1 {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            color: var(--accent-color);
            margin-bottom: 70px;
            text-transform: uppercase;
        }

        #prompt-display {
            font-size: 2.1rem;
            line-height: 1.5;
            margin-bottom: 50px;
            min-height: 160px;
            font-weight: 400;
            transition: opacity 0.8s ease;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            margin-bottom: 60px;
        }

        .btn {
            background: none;
            border: 1px solid var(--accent-color);
            padding: 14px 34px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn:hover { background-color: var(--text-color); color: white; border-color: var(--text-color); }

        .btn-subtle {
            background: none; border: none; font-family: 'Lora', serif;
            font-style: italic; color: var(--accent-color);
            text-decoration: underline; cursor: pointer; font-size: 0.95rem;
        }

        /* Statistics Section */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 30px;
            font-family: 'Inter', sans-serif;
        }

        .stat-item { flex-direction: column; align-items: center; }
        .stat-val { font-size: 1.2rem; font-weight: 400; color: var(--text-color); }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-color); margin-top: 5px; }

        /* Toggles based on CSS variables at top */
        .stat-visitors { display: var(--show-visitors); }
        .stat-notes { display: var(--show-notes); }

        /* Overlays */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--overlay-bg); z-index: 1000;
            padding: 60px 20px; box-sizing: border-box; text-align: left; overflow-y: auto;
        }

        .overlay-content { max-width: 600px; margin: 0 auto; }

        /* Gallery Card Styling */
        .reflection-card {
            margin-bottom: 45px;
            padding-bottom: 30px;
            border-bottom: 1px solid #eee;
        }
        
        .card-prompt {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin-bottom: 12px;
            display: block;
            line-height: 1.4;
        }

        .card-answer {
            font-size: 1.2rem;
            line-height: 1.6;
            color: var(--text-color);
            margin: 0;
        }

        textarea {
            width: 100%; height: 250px; background: #fff; border: 1px solid #eee;
            padding: 20px; font-family: 'Lora', serif; font-size: 1.1rem;
            margin-bottom: 20px; box-sizing: border-box; resize: none; outline: none;
        }

        footer { position: fixed; bottom: 30px; font-family: 'Inter', sans-serif; font-size: 0.7rem; color: var(--accent-color); }
        footer a { color: var(--accent-color); text-decoration: none; margin: 0 15px; }
        .blur { filter: blur(10px); opacity: 0.2; pointer-events: none; }

    </style>
</head>
<body>

    <div class="container" id="main-container">
        <h1>Reasons for Gratitude</h1>
        <div id="prompt-display">...</div>
        
        <div class="button-group">
            <button class="btn" onclick="getRandomPrompt()">Get Another Prompt</button>
            <button class="btn-subtle" onclick="openReflect()">Reflect on this</button>
        </div>

        <div class="stats-bar">
            <div class="stat-item stat-visitors">
                <span class="stat-val">1,204</span>
                <span class="stat-label">Visitors</span>
            </div>
            <div class="stat-item stat-notes">
                <span class="stat-val">84</span>
                <span class="stat-label">Notes of Gratitude</span>
            </div>
        </div>
    </div>

    <div id="reflectOverlay" class="overlay">
        <div class="overlay-content">
            <button class="btn-subtle" onclick="closeAllOverlays()" style="margin-bottom: 40px; padding: 0;">← Close</button>
            <span class="card-prompt">Reflecting on:</span>
            <div id="locked-prompt" style="font-size: 1.5rem; margin-bottom: 30px; font-style: italic;"></div>
            
            <form action="https://formspree.io/f/YOUR_ID_HERE" method="POST">
                <input type="hidden" name="prompt" id="hidden-prompt-input">
                <textarea name="reflection" placeholder="Write your reflection here..." required></textarea>
                <button type="submit" class="btn">Submit for Review</button>
            </form>
        </div>
    </div>

    <div id="galleryOverlay" class="overlay">
        <div class="overlay-content">
            <button class="btn-subtle" onclick="closeAllOverlays()" style="margin-bottom: 40px; padding: 0;">← Back</button>
            <h2 style="font-weight: 400; margin-bottom: 50px; font-size: 1.8rem;">Community Reflections</h2>
            
            <div id="gallery-list"></div>

            <p style="text-align: center; color: var(--accent-color); font-size: 0.75rem; margin-top: 60px; letter-spacing: 1px;">
                NEW REFLECTIONS ADDED WEEKLY.
            </p>
        </div>
    </div>

    <footer>
        <a href="javascript:void(0)" onclick="openGallery()">Read Reflections</a>
        <a href="https://ruishinor.gumroad.com/" target="_blank">The Full Journal</a>
    </footer>

        // --- MANUALLY ADD GALLERY ENTRIES HERE ---
        const galleryEntries = [
            {
                prompt: "Who is someone that makes your life better?",
                answer: "The person that checks in on me regularly with a phone call where we just talk about anything and everything. The person that I still have a deep connection with even without meeting for years now. Neither of them will probably ever understand it fully, but they make ... such a .. huge difference."

            {

                answer: "I know you won't let the facade drop yet. I know you feel so much shame about your circumstances. I know it's heavy. All of it. I don't know if we will ever be able to say .. that it was worth it, but .. I'm still here. You're still here. --and you have actually had significant impact - positive impact - on some people's lives, and that must be important."
            }
        ];

        let currentPromptText = "";

        function getRandomPrompt() {
            const display = document.getElementById('prompt-display');
            display.style.opacity = 0;
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * prompts.length);
                currentPromptText = prompts[randomIndex];
                display.innerText = currentPromptText;
                display.style.opacity = 1;
            }, 600);
        }

        function openReflect() {
            document.getElementById('locked-prompt').innerText = currentPromptText;
            document.getElementById('hidden-prompt-input').value = currentPromptText;
            document.getElementById('reflectOverlay').style.display = 'block';
            document.getElementById('main-container').classList.add('blur');
        }

        function openGallery() {
            const list = document.getElementById('gallery-list');
            list.innerHTML = ''; // Clear existing
            
            galleryEntries.forEach(entry => {
                const card = document.createElement('div');
                card.className = 'reflection-card';
                card.innerHTML = `
                    <span class="card-prompt">Reflecting on: ${entry.prompt}</span>
                    <p class="card-answer">"${entry.answer}"</p>
                `;
                list.appendChild(card);
            });

            document.getElementById('galleryOverlay').style.display = 'block';
            document.getElementById('main-container').classList.add('blur');
        }

        function closeAllOverlays() {
            document.getElementById('reflectOverlay').style.display = 'none';
            document.getElementById('galleryOverlay').style.display = 'none';
            document.getElementById('main-container').classList.remove('blur');
        }

        window.onload = getRandomPrompt;
    </script>
</body>
</html>
